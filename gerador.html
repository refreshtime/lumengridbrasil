<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lumen Grid — Gerador de Proposta</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d0f14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Montserrat,sans-serif}
    .card{background:#1a1d25;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:48px 40px;text-align:center;max-width:480px;width:90%}
    .logo{font-size:13px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:32px;text-transform:uppercase}
    h1{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px}
    p{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:36px}
    .btns{display:flex;gap:14px;flex-direction:column}
    a{display:block;padding:16px 20px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;transition:.15s}
    .solar{background:#E8641A;color:#fff}
    .solar:hover{background:#d45a16}
    .hibrido{background:rgba(232,100,26,.1);border:1.5px solid #E8641A;color:#E8641A}
    .hibrido:hover{background:rgba(232,100,26,.18)}
    .tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.5px;padding:2px 7px;border-radius:4px;margin-left:8px;vertical-align:middle;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5)}
  </style>
</head>
<body>
<script>
  // Roteador por parâmetro: gerador.html?tipo=solar  /  gerador.html?tipo=hibrido
  const tipo = new URLSearchParams(location.search).get('tipo');
  if(tipo === 'solar')   location.replace('gerador-solar.html');
  if(tipo === 'hibrido') location.replace('gerador-hibrido.html');
  // sem parâmetro → mostra o seletor abaixo
</script>
<div class="card">
  <div class="logo">Lumen Grid Energia</div>
  <h1>Gerador de Proposta</h1>
  <p>Selecione o tipo de sistema para gerar a proposta comercial</p>
  <div class="btns">
    <a class="solar" href="gerador-solar.html">
      ☀️ Solar Fotovoltaico (On-Grid)
      <span class="tag">?tipo=solar</span>
    </a>
    <a class="hibrido" href="gerador-hibrido.html">
      🔋 Sistema Híbrido com Bateria
      <span class="tag">?tipo=hibrido</span>
    </a>
  </div>
</div>
</body>
</html>
