<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LumenGrid — Post 01 — Bem-vindo à marca</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#F26522;
  --orange-dark:#C94E0F;
  --black:#111111;
  --white:#FAFAFA;
  --dim:rgba(250,250,250,0.90);
  --W:1080px;--H:1350px;
}
body{background:#1a1a1a;font-family:'Montserrat',sans-serif;display:flex;justify-content:center;align-items:flex-start;padding:40px;}

/* ── SLIDE ── */
.slide{
  width:var(--W);
  height:var(--H);
  position:relative;
  overflow:hidden;
}

/* Foto de fundo */
.bg{
  position:absolute;inset:0;z-index:0;
  background:url('imagens/familia.png') center/cover no-repeat;
}

/* Gradiente escuro sobre a foto */
.overlay{
  position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(to bottom,
      rgba(10,10,10,0.55) 0%,
      rgba(10,10,10,0.20) 35%,
      rgba(10,10,10,0.45) 65%,
      rgba(10,10,10,0.88) 100%
    );
}

/* Faixa laranja no rodapé */
.foot-bar{
  position:absolute;bottom:0;left:0;right:0;height:7px;z-index:30;
  background:linear-gradient(to right, var(--orange-dark), var(--orange), var(--orange-dark));
}

/* ── CANTOS DECORATIVOS ── */
.c{position:absolute;width:28px;height:28px;z-index:20;}
.c.tl{top:32px;left:32px;border-top:2px solid rgba(242,101,34,0.75);border-left:2px solid rgba(242,101,34,0.75);}
.c.tr{top:32px;right:32px;border-top:2px solid rgba(242,101,34,0.75);border-right:2px solid rgba(242,101,34,0.75);}
.c.bl{bottom:24px;left:32px;border-bottom:2px solid rgba(242,101,34,0.75);border-left:2px solid rgba(242,101,34,0.75);}
.c.br{bottom:24px;right:32px;border-bottom:2px solid rgba(242,101,34,0.75);border-right:2px solid rgba(242,101,34,0.75);}

/* ── LOGO BAR (topo) ── */
.lbar{
  position:absolute;top:48px;left:60px;right:60px;
  display:flex;align-items:center;justify-content:space-between;z-index:25;
}
.logo-img{height:52px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6));}
.tagline{
  font-size:10px;letter-spacing:4px;
  color:rgba(242,101,34,0.85);
  font-weight:700;text-transform:uppercase;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
}

/* ── CONTEÚDO CENTRAL ── */
.center{
  position:absolute;inset:0;z-index:15;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:160px 80px 120px;
}

/* badge */
.pill{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid rgba(242,101,34,0.75);
  color:var(--orange);
  font-size:10px;font-weight:700;letter-spacing:5px;
  text-transform:uppercase;padding:8px 28px;
  margin-bottom:32px;
  text-shadow:none;
}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);}

/* headline principal */
.h-intro{
  font-size:28px;font-weight:300;
  color:var(--dim);
  letter-spacing:8px;text-transform:uppercase;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
  margin-bottom:8px;
}
.h-brand{
  font-size:118px;font-weight:900;
  line-height:0.85;
  color:var(--orange);
  text-transform:uppercase;
  letter-spacing:-4px;
  text-shadow:0 4px 40px rgba(242,101,34,0.40), 0 2px 8px rgba(0,0,0,0.9);
  margin-bottom:10px;
}
.h-grid{
  font-size:118px;font-weight:900;
  line-height:0.85;
  color:var(--white);
  text-transform:uppercase;
  letter-spacing:-4px;
  text-shadow:0 4px 32px rgba(0,0,0,0.95), 0 2px 8px rgba(0,0,0,0.8);
  margin-bottom:36px;
}

/* divisor */
.rule{
  width:56px;height:3px;
  background:linear-gradient(to right, var(--orange-dark), var(--orange));
  margin:0 auto 32px;
}

/* subtítulo */
.sub{
  font-size:26px;font-weight:400;
  color:var(--dim);
  line-height:1.55;
  text-shadow:0 2px 16px rgba(0,0,0,0.95);
  max-width:820px;
}
.sub strong{color:var(--orange);font-weight:700;}

/* hint deslize */
.hint{
  position:absolute;bottom:48px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:16px;
  font-size:10px;letter-spacing:4px;
  color:rgba(242,101,34,0.65);font-weight:600;
  text-transform:uppercase;z-index:20;
}
.hline{width:32px;height:1px;background:rgba(242,101,34,0.45);}

</style>
</head>
<body>
<div class="slide">

  <!-- Fundo foto -->
  <div class="bg"></div>

  <!-- Overlay escuro -->
  <div class="overlay"></div>

  <!-- Cantos -->
  <div class="c tl"></div>
  <div class="c tr"></div>
  <div class="c bl"></div>
  <div class="c br"></div>

  <!-- Logo bar -->
  <div class="lbar">
    <img class="logo-img" src="imagens/lumengrid_logo_bateria.png" alt="LumenGrid">
    <span class="tagline">Energia Inteligente</span>
  </div>

  <!-- Conteúdo central -->
  <div class="center">
    <div class="pill"><span class="pill-dot"></span>Conheça a marca<span class="pill-dot"></span></div>
    <p class="h-intro">Bem-vindo à</p>
    <p class="h-brand">Lumen</p>
    <p class="h-grid">Grid</p>
    <div class="rule"></div>
    <p class="sub">
      Energia solar com <strong>inteligência, qualidade</strong><br>
      e suporte real para a sua casa ou empresa.
    </p>
  </div>

  <!-- Swipe hint -->
  <div class="hint">
    <span class="hline"></span>
    deslize para conhecer
    <span class="hline"></span>
  </div>

  <!-- Faixa rodapé -->
  <div class="foot-bar"></div>

</div>
</body>
</html>
