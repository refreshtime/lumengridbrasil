<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LumenGrid — Post 01 — Bem-vindo à marca</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#F26522;
  --orange-dark:#C94E0F;
  --black:#111111;
  --white:#FAFAFA;
  --dim:rgba(250,250,250,0.90);
  --W:1080px;--H:1350px;
}
body{background:#1a1a1a;font-family:'DM Sans',sans-serif;display:flex;justify-content:center;align-items:flex-start;padding:40px;}

/* ── SLIDE ── */
.slide{
  width:var(--W);
  height:var(--H);
  position:relative;
  overflow:hidden;
}

/* Foto de fundo */
.bg{
  position:absolute;inset:0;z-index:0;
  background:url('imagens/Familia lumen.png') center/cover no-repeat;
}

/* Gradiente escuro */
.overlay{
  position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(to bottom,
      rgba(8,8,8,0.70) 0%,
      rgba(8,8,8,0.25) 30%,
      rgba(8,8,8,0.35) 60%,
      rgba(8,8,8,0.92) 100%
    );
}

/* Faixa laranja no rodapé */
.foot-bar{
  position:absolute;bottom:0;left:0;right:0;height:6px;z-index:30;
  background:linear-gradient(to right, var(--orange-dark), var(--orange), var(--orange-dark));
}

/* ── CANTOS DECORATIVOS ── */
.c{position:absolute;width:32px;height:32px;z-index:20;}
.c.tl{top:36px;left:36px;border-top:2px solid rgba(242,101,34,0.70);border-left:2px solid rgba(242,101,34,0.70);}
.c.tr{top:36px;right:36px;border-top:2px solid rgba(242,101,34,0.70);border-right:2px solid rgba(242,101,34,0.70);}
.c.bl{bottom:28px;left:36px;border-bottom:2px solid rgba(242,101,34,0.70);border-left:2px solid rgba(242,101,34,0.70);}
.c.br{bottom:28px;right:36px;border-bottom:2px solid rgba(242,101,34,0.70);border-right:2px solid rgba(242,101,34,0.70);}

/* ── LOGO BAR (topo) ── */
.lbar{
  position:absolute;top:52px;left:64px;right:64px;
  display:flex;align-items:center;justify-content:space-between;z-index:25;
}
/* Logo CSS inline — EI no topo + ícone + LUMENGRID */
.logo-css{display:flex;flex-direction:column;align-items:flex-start;gap:3px;line-height:1;}
.logo-css .ei{
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:7px;
  text-transform:uppercase;letter-spacing:0.38em;padding-left:0.38em;
  color:rgba(242,101,34,0.85);text-shadow:0 1px 6px rgba(0,0,0,0.9);
}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-icon{height:40px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));}
.logo-nome{display:flex;align-items:baseline;}
.logo-css .lm{
  font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:38px;
  text-transform:uppercase;color:#F26522;letter-spacing:-1px;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
}
.logo-css .gr{
  font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:38px;
  text-transform:uppercase;color:#FFFFFF;letter-spacing:-1px;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
}
.logo-css .ei{
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:7.5px;
  text-transform:uppercase;letter-spacing:0.35em;
  color:rgba(242,101,34,0.80);
  text-shadow:0 1px 6px rgba(0,0,0,0.9);
}
.tagline{
  font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:5px;
  color:rgba(242,101,34,0.80);
  font-weight:700;text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,0.9);
}

/* ── CONTEÚDO CENTRAL ── */
.center{
  position:absolute;inset:0;z-index:15;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:160px 80px 120px;
}

/* badge */
.pill{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid rgba(242,101,34,0.70);
  color:var(--orange);
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:5px;
  text-transform:uppercase;padding:9px 28px;
  margin-bottom:36px;
}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);}

/* "Bem-vindo à" */
.h-intro{
  font-family:'DM Sans',sans-serif;
  font-size:22px;font-weight:300;
  color:rgba(250,250,250,0.80);
  letter-spacing:8px;text-transform:uppercase;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
  margin-bottom:20px;
}

/* LUMENGRID — UMA SÓ LINHA, sem partir a marca */
.h-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:106px;
  font-weight:700;
  line-height:1.0;
  text-transform:uppercase;
  letter-spacing:-3px;
  text-shadow:0 4px 48px rgba(0,0,0,0.95), 0 2px 12px rgba(0,0,0,0.8);
  margin-bottom:12px;
  white-space:nowrap;
}
/* LUMEN em laranja */
.h-brand .lumen{color:var(--orange);}
/* GRID em branco */
.h-brand .grid{color:var(--white);}

/* Subtítulo da marca — linha fina */
.h-sub-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:20px;font-weight:300;
  color:rgba(250,250,250,0.50);
  letter-spacing:10px;
  text-transform:uppercase;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
  margin-bottom:44px;
}

/* divisor */
.rule{
  width:60px;height:3px;
  background:linear-gradient(to right, var(--orange-dark), var(--orange));
  margin:0 auto 36px;
}

/* subtítulo principal */
.sub{
  font-family:'DM Sans',sans-serif;
  font-size:26px;font-weight:400;
  color:var(--dim);
  line-height:1.55;
  text-shadow:0 2px 20px rgba(0,0,0,0.98);
  max-width:840px;
}
.sub strong{color:var(--orange);font-weight:700;}

/* hint deslize */
.hint{
  position:absolute;bottom:48px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:16px;
  font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:4px;
  color:rgba(242,101,34,0.60);font-weight:600;
  text-transform:uppercase;z-index:20;
}
.hline{width:32px;height:1px;background:rgba(242,101,34,0.40);}
</style>
</head>
<body>
<div class="slide">

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="c tl"></div>
  <div class="c tr"></div>
  <div class="c bl"></div>
  <div class="c br"></div>

  <!-- Logo bar -->
  <div class="lbar">
    <div class="logo-css">
      <div class="logo-row">
        <img class="logo-icon" src="imagens/logo - icone da logo.png" alt="">
        <div class="logo-nome"><span class="lm">LUMEN</span><span class="gr">GRID</span></div>
      </div>
      <span class="ei">Energia Inteligente</span>
    </div>
  </div>

  <!-- Conteúdo central -->
  <div class="center">
    <div class="pill"><span class="pill-dot"></span>Conheça a marca<span class="pill-dot"></span></div>

    <p class="h-intro">Bem-vindo à</p>

    <!-- LUMENGRID em uma linha — LUMEN laranja, GRID branco -->
    <p class="h-brand"><span class="lumen">LUMEN</span><span class="grid">GRID</span></p>

    <p class="h-sub-brand">Energia Inteligente</p>

    <div class="rule"></div>

    <p class="sub">
      Energia solar com <strong>inteligência, qualidade</strong><br>
      e suporte real para a sua casa ou empresa.
    </p>
  </div>

  <div class="hint">
    <span class="hline"></span>
    deslize para conhecer
    <span class="hline"></span>
  </div>

  <div class="foot-bar"></div>

</div>
</body>
</html>
