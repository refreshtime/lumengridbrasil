<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lumen Grid — Gerador de Contrato</title>
<script>if(!sessionStorage.getItem('lg_auth')){location.replace('login.html');}</script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E8641A;--or-l:#FF8040;--ink:#0F0F0F;--white:#F8F8F8;
  --ui:#0e1117;--uic:#16191f;--uib:#2a2d35;--uit:#e8eaf0;--uim:#7a8090;
}
body{font-family:'Montserrat',sans-serif;background:var(--ui);color:var(--uit);min-height:100vh}
.ed-header{background:var(--ink);border-bottom:2px solid rgba(232,100,26,.3);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.ed-logo{font-size:18px;font-weight:900;letter-spacing:3px;color:var(--or)}.ed-logo span{color:#fff}
.ed-sub{font-size:8px;letter-spacing:3px;color:rgba(232,100,26,.5);margin-top:3px}
.ed-layout{display:grid;grid-template-columns:420px 1fr;min-height:calc(100vh - 68px)}
.form-panel{background:var(--uic);border-right:1px solid var(--uib);overflow-y:auto;max-height:calc(100vh - 68px);padding:20px 18px 100px;position:sticky;top:0}
.fs{margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--uib)}
.fs:last-of-type{border-bottom:none}
.fs-title{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--or);margin-bottom:12px;padding-left:9px;border-left:3px solid var(--or)}
.fl{display:block;font-size:9px;font-weight:700;color:var(--uim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.fi,.fsel,.fta{width:100%;padding:8px 11px;background:#0a0c10;border:1.5px solid var(--uib);border-radius:6px;font-size:12px;color:var(--uit);font-family:inherit;transition:border-color .2s;margin-bottom:9px}
.fi:focus,.fsel:focus,.fta:focus{outline:none;border-color:var(--or)}
.fi::placeholder{color:#3a3f4a}
.fta{resize:vertical;min-height:60px}
.fsel option{background:#0e1117}
.frow{display:flex;gap:8px}.frow>div{flex:1}
.btn-bar{display:flex;gap:7px;padding:14px 18px;background:var(--ink);border-top:1px solid var(--uib);position:sticky;bottom:0;width:420px}
.btn{padding:10px 18px;border-radius:6px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.bp{background:var(--or);color:#fff}.bp:hover{background:var(--or-l)}
.bpdf{background:#1a1f1a;color:var(--or);border:1.5px solid var(--or);padding:10px 18px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* PREVIEW */
.prev-panel{overflow-y:auto;background:#e8e8e8;padding:30px;display:flex;flex-direction:column;align-items:center}

/* CONTRACT PAGES */
.cpage{width:800px;background:#fff;padding:60px 72px;margin-bottom:8px;font-family:'Times New Roman',Times,serif;font-size:12px;line-height:1.7;color:#111;position:relative;box-shadow:0 2px 20px rgba(0,0,0,.15)}
.cpage-cont{width:800px;background:#fff;padding:40px 72px 60px;margin-bottom:8px;font-family:'Times New Roman',Times,serif;font-size:12px;line-height:1.7;color:#111;box-shadow:0 2px 20px rgba(0,0,0,.15)}

/* Contract header */
.ch{display:flex;align-items:center;justify-content:space-between;padding-bottom:18px;border-bottom:3px solid #E8641A;margin-bottom:28px}
.ch-logo{height:50px;object-fit:contain}
.ch-right{text-align:right}
.ch-title{font-size:15px;font-weight:700;letter-spacing:2px;color:#E8641A;font-family:'Montserrat',sans-serif}
.ch-subtitle{font-size:10px;color:#666;font-family:'Montserrat',sans-serif;margin-top:2px}

/* Contract body */
.ctitle{text-align:center;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;color:#111;font-family:'Montserrat',sans-serif}
.csubtitle{text-align:center;font-size:11px;color:#555;margin-bottom:30px;font-style:italic}
.cnum{font-weight:700;color:#E8641A}
.clausula{margin-bottom:20px}
.clausula-title{font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;color:#111;border-left:3px solid #E8641A;padding-left:8px}
.clausula p{margin-bottom:8px;text-align:justify}
.clausula ul{margin:8px 0 8px 24px}
.clausula ul li{margin-bottom:5px;text-align:justify}
.clausula .pitem{margin-bottom:6px;padding-left:20px;text-align:justify}
.qual-box{background:#f8f8f8;border:1px solid #ddd;border-radius:6px;padding:16px 20px;margin-bottom:16px}
.qual-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#E8641A;margin-bottom:6px;font-family:'Montserrat',sans-serif}
.qual-line{margin-bottom:4px}
.qual-line strong{color:#111}
.equip-box{background:#f8f8f8;border:1px solid #ddd;border-radius:6px;padding:16px 20px;margin:10px 0}
.equip-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#E8641A;margin-bottom:8px;font-family:'Montserrat',sans-serif}
.etrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
.etrow:last-child{border-bottom:none}
.pay-box{background:#f8f8f8;border-left:3px solid #E8641A;padding:12px 16px;margin:10px 0}
.sign-section{margin-top:40px}
.sign-line{display:flex;gap:40px;margin-bottom:30px}
.sign-block{flex:1;text-align:center}
.sign-underline{border-top:1px solid #333;padding-top:8px;margin-top:40px;font-size:11px}
.sign-role{font-size:10px;color:#666;margin-top:3px}
.doc-footer{border-top:2px solid #E8641A;margin-top:30px;padding-top:12px;display:flex;justify-content:space-between;align-items:center}
.df-brand{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#E8641A}
.df-info{font-size:9px;color:#999}

/* Alert box */
.alert-box{background:#fff8f0;border:1px solid rgba(232,100,26,.3);border-left:3px solid #E8641A;border-radius:6px;padding:12px 16px;margin:10px 0;font-size:11px;color:#555;font-family:'Montserrat',sans-serif}

@media print{
  body{background:#fff}
  .ed-header,.form-panel,.btn-bar{display:none!important}
  .ed-layout{display:block}
  .prev-panel{background:#fff;padding:10px}
  .cpage,.cpage-cont{box-shadow:none;margin-bottom:0;page-break-after:always}
  .cpage:last-child,.cpage-cont:last-child{page-break-after:auto}
  @page{size:A4;margin:0}
}

@media(max-width:768px){
  .ed-header{padding:10px 16px;flex-wrap:wrap;gap:8px}
  .editor{padding:16px}
  .fs{padding:14px;margin-bottom:14px}
  .frow{flex-direction:column;gap:8px}
  .frow>div{width:100%!important;max-width:100%!important}
  .btn-bar{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .btn-bar button{flex:1;min-width:130px}
  #previewArea{display:none}
  .ed-layout{display:block}
}
</style>
</head>
<body>

<div class="ed-header">
  <div>
    <div class="ed-logo">LUMEN<span>GRID</span></div>
    <div class="ed-sub">GERADOR DE CONTRATO — ENERGIA INTELIGENTE</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <a href="portal.html" style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);text-decoration:none">&#8592; Portal</a>
    <button class="bpdf" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="ed-layout">
<div class="form-panel">

  <div class="fs">
    <div class="fs-title">Dados do Contrato</div>
    <div class="frow">
      <div><label class="fl">Nº do Contrato</label><input class="fi" id="cNum" placeholder="LG-2026-0001"></div>
      <div><label class="fl">Data de Emissão</label><input class="fi" type="date" id="cData"></div>
    </div>
    <label class="fl">Tipo de Sistema</label>
    <select class="fsel" id="tipoSistema">
      <option value="solar_bateria">Energia Solar Fotovoltaica com Armazenamento em Bateria</option>
      <option value="solar">Energia Solar Fotovoltaica (sem bateria)</option>
    </select>
  </div>

  <div class="fs">
    <div class="fs-title">CONTRATANTE (Cliente)</div>
    <label class="fl">Nome Completo / Razão Social</label>
    <input class="fi" id="cliNome" placeholder="Ex: João da Silva">
    <div class="frow">
      <div><label class="fl">CPF / CNPJ</label><input class="fi" id="cliDoc" placeholder="000.000.000-00"></div>
      <div><label class="fl">RG (se PF)</label><input class="fi" id="cliRG" placeholder="00.000.000-0"></div>
    </div>
    <label class="fl">Endereço Completo</label>
    <input class="fi" id="cliEnder" placeholder="Rua, número, bairro">
    <div class="frow">
      <div><label class="fl">Cidade / UF</label><input class="fi" id="cliCidade" placeholder="São Paulo, SP"></div>
      <div><label class="fl">CEP</label><input class="fi" id="cliCEP" placeholder="00000-000"></div>
    </div>
    <label class="fl">E-mail</label>
    <input class="fi" id="cliEmail" placeholder="email@exemplo.com" type="email">
    <label class="fl">Telefone / WhatsApp</label>
    <input class="fi" id="cliFone" placeholder="(11) 9 0000-0000">
  </div>

  <div class="fs">
    <div class="fs-title">Local de Instalação</div>
    <label class="fl">Endereço da Instalação (se diferente do cliente)</label>
    <input class="fi" id="instEnder" placeholder="Deixe vazio se for o mesmo endereço do cliente">
    <div class="frow">
      <div>
        <label class="fl">Tipo</label>
        <select class="fsel" id="instTipo">
          <option value="Residencial">Residencial</option>
          <option value="Comercial">Comercial</option>
          <option value="Industrial">Industrial</option>
          <option value="Rural/Agrícola">Rural/Agrícola</option>
          <option value="Condomínio">Condomínio</option>
        </select>
      </div>
      <div>
        <label class="fl">Conexão</label>
        <select class="fsel" id="instConexao">
          <option value="Monofásico">Monofásico</option>
          <option value="Bifásico">Bifásico</option>
          <option value="Trifásico">Trifásico</option>
        </select>
      </div>
    </div>
  </div>

  <div class="fs">
    <div class="fs-title">Equipamentos</div>
    <div class="frow">
      <div><label class="fl">Qtd Módulos</label><input class="fi" type="number" id="eqModQty" placeholder="10"></div>
      <div><label class="fl">Potência (W)</label><input class="fi" type="number" id="eqModPwr" placeholder="550"></div>
    </div>
    <label class="fl">Modelo do Módulo</label>
    <input class="fi" id="eqModModel" placeholder="Ex: Canadian Solar CS6L-450MS">
    <div class="frow">
      <div><label class="fl">Qtd Inversores</label><input class="fi" type="number" id="eqInvQty" placeholder="1"></div>
      <div><label class="fl">Potência (kW)</label><input class="fi" type="number" id="eqInvPwr" placeholder="8"></div>
    </div>
    <label class="fl">Modelo do Inversor</label>
    <input class="fi" id="eqInvModel" placeholder="Ex: Growatt SPH 8000TL3 BH">
    <div class="frow">
      <div><label class="fl">Bateria — Qtd</label><input class="fi" type="number" id="eqBatQty" placeholder="1" min="0"></div>
      <div><label class="fl">Capacidade (kWh)</label><input class="fi" type="number" id="eqBatKwh" placeholder="10" min="0"></div>
    </div>
    <label class="fl">Modelo da Bateria (deixe vazio se não houver)</label>
    <input class="fi" id="eqBatModel" placeholder="Ex: Growatt ARK 10kWh">
    <div class="frow">
      <div><label class="fl">Potência Total (kVp)</label><input class="fi" id="eqKvp" placeholder="5.50 kVp"></div>
      <div><label class="fl">Geração Estimada/mês</label><input class="fi" id="eqGen" placeholder="720 kWh"></div>
    </div>
    <label class="fl">Estrutura de Fixação</label>
    <select class="fsel" id="eqEstrutura">
      <option value="Telhado cerâmico (colonial)">Telhado cerâmico (colonial)</option>
      <option value="Telhado metálico (trapezoidal)">Telhado metálico (trapezoidal)</option>
      <option value="Telhado fibrocimento">Telhado fibrocimento</option>
      <option value="Solo (estrutura elevada)">Solo (estrutura elevada)</option>
      <option value="Laje">Laje</option>
      <option value="Outro">Outro</option>
    </select>
    <label class="fl">Itens adicionais (opcional)</label>
    <textarea class="fta" id="eqAdicionais" placeholder="Ex: Wallbox 7,4kW, String box, Cabo solar 120m..."></textarea>
  </div>

  <div class="fs">
    <div class="fs-title">Valor e Pagamento</div>
    <label class="fl">Valor Total do Contrato (R$)</label>
    <input class="fi" type="number" id="payTotal" placeholder="45000" step="0.01">
    <div class="frow">
      <div><label class="fl">Entrada (R$)</label><input class="fi" type="number" id="payEntrada" placeholder="15000" step="0.01"></div>
      <div><label class="fl">Saldo (R$) — auto</label><input class="fi" id="paySaldo" placeholder="Auto" readonly style="opacity:.6"></div>
    </div>
    <label class="fl">Condição do Saldo</label>
    <select class="fsel" id="payCond">
      <option value="Na instalação">Na instalação</option>
      <option value="Na homologação pela concessionária">Na homologação pela concessionária</option>
      <option value="Na ativação do sistema">Na ativação do sistema</option>
      <option value="Parcelado no cartão">Parcelado no cartão</option>
      <option value="Financiamento bancário">Financiamento bancário</option>
    </select>
    <label class="fl">Detalhes do Pagamento</label>
    <textarea class="fta" id="payDetalhe" placeholder="Ex: Entrada via PIX, saldo em 12x no cartão de crédito sem juros..."></textarea>
    <label class="fl">Prazo de Execução (dias úteis)</label>
    <input class="fi" type="number" id="payPrazo" placeholder="20" value="20">
  </div>

  <div class="fs">
    <div class="fs-title">Garantias (anos)</div>
    <div class="frow">
      <div><label class="fl">Módulos</label><input class="fi" type="number" id="warMod" value="25"></div>
      <div><label class="fl">Microinversor</label><input class="fi" type="number" id="warMicro" value="15"></div>
    </div>
    <div class="frow">
      <div><label class="fl">Inversor String</label><input class="fi" type="number" id="warInv" value="10"></div>
      <div><label class="fl">Bateria</label><input class="fi" type="number" id="warBat" value="10"></div>
    </div>
    <div class="frow">
      <div><label class="fl">Instalação</label><input class="fi" type="number" id="warInst" value="1"></div>
      <div><label class="fl">Desempenho (%)</label><input class="fi" type="number" id="warDesemp" value="80"></div>
    </div>
  </div>

  <div class="fs">
    <div class="fs-title">Vendedor / Consultor</div>
    <div class="frow">
      <div><label class="fl">Nome do Consultor</label><input class="fi" id="vendNome" placeholder="Nome"></div>
      <div><label class="fl">Cargo</label><input class="fi" id="vendCargo" placeholder="Consultor de Energia"></div>
    </div>

  </div>

  <div class="fs">
    <div class="fs-title">Cidade para Foro / Assinatura</div>
    <input class="fi" id="cForo" placeholder="Ex: São Paulo">
    <label class="fl">Observações Especiais</label>
    <textarea class="fta" id="cObs" placeholder="Condições especiais, exclusões, observações técnicas..."></textarea>
  </div>

  <div class="btn-bar">
    <button class="bp btn" onclick="generateContract()">📄 Gerar Contrato</button>
    <button class="bpdf btn" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="prev-panel" id="prevPanel">
  <div style="color:#999;text-align:center;margin:auto;font-family:Montserrat,sans-serif;font-size:12px">
    <div style="font-size:40px;margin-bottom:14px">📄</div>
    Preencha os dados e clique em <strong>Gerar Contrato</strong>
  </div>
</div>
</div>

// Auto calc saldo
document.getElementById('payTotal').addEventListener('input',calcSaldo);
document.getElementById('payEntrada').addEventListener('input',calcSaldo);
function calcSaldo(){
  const t=parseFloat(document.getElementById('payTotal').value)||0;
  const e=parseFloat(document.getElementById('payEntrada').value)||0;
  document.getElementById('paySaldo').value=t>0?fmtBRL(t-e):'';
}

// Init date
document.getElementById('cData').value=new Date().toISOString().slice(0,10);

function fmtBRL(v){return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'__/__/____';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function ext(id){return document.getElementById(id).value.trim();}
function exN(id){return parseFloat(document.getElementById(id).value)||0;}

function generateContract(){
  const num=ext('cNum')||'001/'+new Date().getFullYear();
  const data=fmtDate(ext('cData'));
  const cliNome=ext('cliNome')||'[NOME DO CLIENTE]';
  const cliDoc=ext('cliDoc')||'[CPF/CNPJ]';
  const cliRG=ext('cliRG');
  const cliEnder=ext('cliEnder')||'[ENDEREÇO]';
  const cliCidade=ext('cliCidade')||'[CIDADE/UF]';
  const cliCEP=ext('cliCEP');
  const cliEmail=ext('cliEmail');
  const cliFone=ext('cliFone');
  const instEnder=ext('instEnder')||cliEnder+', '+cliCidade;
  const instTipo=ext('instTipo');
  const instConexao=ext('instConexao');
  const modQty=exN('eqModQty');
  const modPwr=exN('eqModPwr');
  const modModel=ext('eqModModel');
  const invQty=exN('eqInvQty');
  const invPwr=exN('eqInvPwr');
  const invModel=ext('eqInvModel');
  const batQty=exN('eqBatQty');
  const batKwh=exN('eqBatKwh');
  const batModel=ext('eqBatModel');
  const kvp=ext('eqKvp')||(modQty&&modPwr?(modQty*modPwr/1000).toFixed(2)+' kVp':'');
  const gen=ext('eqGen');
  const estrutura=ext('eqEstrutura');
  const adicionais=ext('eqAdicionais');
  const payTotal=exN('payTotal');
  const payEntrada=exN('payEntrada');
  const paySaldo=payTotal-payEntrada;

function numPorExtenso(v){
  if(!v)return'zero reais';
  const inteiro=Math.floor(v);
  const cent=Math.round((v-inteiro)*100);
  const n=numInt(inteiro);
  const c=cent>0?' e '+numInt(cent)+' centavo'+(cent!==1?'s':''):'';
  return n+' real'+(inteiro!==1?'s es':'')+c;
}
function numInt(n){
  if(n===0)return'zero';
  const u=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const d=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const c=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  if(n===100)return'cem';
  if(n<20)return u[n];
  if(n<100)return d[Math.floor(n/10)]+(n%10?' e '+u[n%10]:'');
  const r=n%100;
  return c[Math.floor(n/100)]+(r?' e '+(r<20?u[r]:d[Math.floor(r/10)]+(r%10?' e '+u[r%10]:'')):'');
}
function numPorExtensoInt(n){return numInt(n);}
