<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lumen Grid — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#E8641A;--accent-d:rgba(232,100,26,.12);--accent-h:#F07328;
  --bg:#0A0A0C;--s1:#111115;--s2:#18181D;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.04);
  --t1:#F4F4F5;--t2:#A1A1AA;--t3:#52525B;
  --red:#F87171;--red-d:rgba(248,113,113,.1);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}

/* Background pattern */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,100,26,.08) 0%, transparent 60%);
  pointer-events:none;
}

.wrap{width:100%;max-width:400px;padding:24px}

/* Logo */
.brand{text-align:center;margin-bottom:40px}
.brand-mark{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;letter-spacing:4px;color:var(--accent)}
.brand-mark span{color:var(--t1)}
.brand-sub{font-size:10px;letter-spacing:3px;color:var(--t3);margin-top:4px;text-transform:uppercase;font-weight:500}

/* Card */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.card-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t3);margin-bottom:28px}

/* Form */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:6px}
.fi-wrap{position:relative}
.fi{
  width:100%;padding:11px 14px;
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:8px;
  font-size:13px;color:var(--t1);
  font-family:'Inter',sans-serif;
  transition:border-color .15s;
}
.fi:focus{outline:none;border-color:rgba(232,100,26,.5)}
.fi::placeholder{color:var(--t3)}
.fi-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--t3);cursor:pointer;display:flex;align-items:center}
.fi-icon:hover{color:var(--t2)}
.fi-icon svg{width:16px;height:16px}

/* Error */
.err-msg{
  background:var(--red-d);
  border:1px solid rgba(248,113,113,.2);
  border-radius:7px;
  padding:10px 14px;
  font-size:12px;color:var(--red);
  margin-bottom:16px;
  display:none;
  align-items:center;gap:8px;
}
.err-msg.show{display:flex}
.err-msg svg{width:14px;height:14px;flex-shrink:0}

/* Button */
.btn-login{
  width:100%;padding:12px;
  background:var(--accent);color:#fff;
  border:none;border-radius:8px;
  font-size:13px;font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;
}
.btn-login:hover{background:var(--accent-h)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.btn-login svg{width:16px;height:16px}

/* Spinner */
.spin{animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-login.loading .spin{display:block}
.btn-login.loading .ico-enter{display:none}

/* Footer */
.login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--t3)}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-mark">LUMEN<span>GRID</span></div>
    <div class="brand-sub">Portal de Gestão</div>
  </div>

  <div class="card">
    <div class="card-title">Bem-vindo de volta</div>
    <div class="card-sub">Insira suas credenciais para continuar</div>

    <div class="err-msg" id="errMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Usuário ou senha incorretos.
    </div>

    <div class="fg">
      <label>Usuário</label>
      <div class="fi-wrap">
        <input class="fi" id="user" type="text" placeholder="Digite seu usuário" autocomplete="username" onkeydown="onKey(event)">
      </div>
    </div>

    <div class="fg">
      <label>Senha</label>
      <div class="fi-wrap">
        <input class="fi" id="pass" type="password" placeholder="••••••••••" autocomplete="current-password" style="padding-right:42px" onkeydown="onKey(event)">
        <span class="fi-icon" onclick="togglePass()" title="Mostrar/ocultar senha">
          <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </span>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <svg class="ico-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg>
      Entrar
    </button>
  </div>

  <div class="login-footer">Acesso restrito &mdash; Lumen Grid Energia Inteligente</div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIGURAÇÃO DE CREDENCIAIS
// Para alterar a senha: abra o console do navegador (F12)
// e execute: sha256('nova_senha').then(h => console.log(h))
// Copie o hash gerado e substitua abaixo.
//
// Usuário padrão : admin
// Senha padrão   : Lumen@2026
// ══════════════════════════════════════════════════════
const USERS = {
  'admin': 'fd263ba5540860ee50f80b821270ef5d52666678eaf382f12cdef1b22bc9ecc4'
  // Para adicionar mais usuários:
  // 'consultor': 'hash_da_senha_aqui'
};

// Onde ir após login bem-sucedido
const REDIRECT = 'portal.html';

// ══════════════════════════════════════════════════════

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const user=document.getElementById('user').value.trim().toLowerCase();
  const pass=document.getElementById('pass').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errMsg');

  if(!user||!pass)return;

  btn.classList.add('loading');
  btn.disabled=true;
  err.classList.remove('show');

  const hash=await sha256(pass);

  // Simulated delay for security (avoid instant brute-force feedback)
  await new Promise(r=>setTimeout(r,400));

  if(USERS[user]&&USERS[user]===hash){
    sessionStorage.setItem('lg_auth', btoa(user+':'+Date.now()));
    sessionStorage.setItem('lg_user', user);
    location.href=REDIRECT;
  } else {
    btn.classList.remove('loading');
    btn.disabled=false;
    err.classList.add('show');
    document.getElementById('pass').value='';
    document.getElementById('pass').focus();
  }
}

function onKey(e){if(e.key==='Enter')doLogin();}

function togglePass(){
  const inp=document.getElementById('pass');
  const on=document.getElementById('eyeOn');
  const off=document.getElementById('eyeOff');
  if(inp.type==='password'){inp.type='text';on.style.display='none';off.style.display='block';}
  else{inp.type='password';on.style.display='block';off.style.display='none';}
}

// Se já está autenticado, vai direto pro portal
if(sessionStorage.getItem('lg_auth')){location.href=REDIRECT;}

// Focus no campo usuário
document.getElementById('user').focus();
</script>
</body>
</html>
