<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LumenGrid — Capa Facebook 1702×630</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0d0d0d;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:40px;gap:14px;
}
.label{
  font-family:'Space Grotesk',sans-serif;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);
}

/* ══ CAPA 1702×630 ══ */
.capa{
  width:1702px;height:630px;
  position:relative;overflow:hidden;flex-shrink:0;
}

/* Foto full-bleed — position 18% mostra mais das placas no topo */
.bg{
  position:absolute;inset:0;z-index:0;
  background:url('../imagens/Familia lumen.png') center 18%/cover no-repeat;
}

/* Overlay: zona escura sólida à esquerda (marca) → família visível à direita */
.overlay{
  position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(to right,
      rgba(5,5,5,0.96) 0%,
      rgba(5,5,5,0.90) 20%,
      rgba(5,5,5,0.55) 36%,
      rgba(5,5,5,0.08) 52%,
      rgba(5,5,5,0.00) 100%
    ),
    linear-gradient(to bottom,
      rgba(5,5,5,0.20) 0%,
      rgba(5,5,5,0.00) 18%,
      rgba(5,5,5,0.00) 55%,
      rgba(5,5,5,0.68) 100%
    );
}

/* ══ LOGO — lateral esquerda, quase no topo ══ */
.logo-panel{
  position:absolute;
  left:0;top:0;
  width:560px;
  display:flex;flex-direction:column;
  justify-content:flex-start;
  padding:38px 52px 0 60px;
  z-index:20;
}
.logo-row{display:flex;align-items:center;gap:18px;}
.logo-icon{
  height:80px;width:auto;object-fit:contain;
  filter:drop-shadow(0 3px 16px rgba(0,0,0,0.90));
}
.logo-nome{display:flex;align-items:baseline;}
.lm{
  font-family:'Space Grotesk',sans-serif;
  font-weight:800;font-size:76px;
  text-transform:uppercase;color:#F26522;letter-spacing:-2px;
  text-shadow:0 3px 28px rgba(0,0,0,0.95);
}
.gr{
  font-family:'Space Grotesk',sans-serif;
  font-weight:800;font-size:76px;
  text-transform:uppercase;color:#FFFFFF;letter-spacing:-2px;
  text-shadow:0 3px 28px rgba(0,0,0,0.95);
}
.ei{
  font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:13px;
  text-transform:uppercase;letter-spacing:0.42em;padding-left:0.42em;
  color:rgba(242,101,34,0.90);
  text-shadow:0 1px 10px rgba(0,0,0,0.95);
  margin-top:6px;
}

/* ══ BARRA INFERIOR — serviços ══ */
.bar{
  position:absolute;
  bottom:0;left:0;right:0;
  height:130px;
  background:linear-gradient(to bottom, rgba(5,5,5,0.08) 0%, rgba(5,5,5,0.58) 100%);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  border-top:1.5px solid rgba(242,101,34,0.40);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:0 60px 0 540px;
  z-index:20;
}

.bar-services{
  display:flex;align-items:center;
  justify-content:space-evenly;
  width:100%;
}

.svc{
  display:flex;align-items:center;gap:18px;
  padding:0 28px;
  border-right:1px solid rgba(242,101,34,0.22);
}
.svc:last-child{border-right:none;}

.svc-icon{
  width:52px;height:52px;flex-shrink:0;
  border-radius:50%;
  background:rgba(242,101,34,0.12);
  border:1.5px solid rgba(242,101,34,0.55);
  display:flex;align-items:center;justify-content:center;
}
.svc-icon svg{
  width:26px;height:26px;
  stroke:#F26522;fill:none;
  stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;
}
.svc-text{display:flex;flex-direction:column;gap:5px;}
.svc-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:20px;font-weight:700;
  color:#FFFFFF;letter-spacing:-0.3px;
  white-space:nowrap;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
}
.svc-desc{
  font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:400;
  color:rgba(255,255,255,0.68);
  white-space:nowrap;
  text-shadow:0 1px 8px rgba(0,0,0,0.85);
}

/* Faixa laranja fina no rodapé */
.foot-bar{
  position:absolute;bottom:0;left:0;right:0;height:5px;z-index:30;
  background:linear-gradient(to right,#C94E0F,#F26522,#F47A3A,#F26522,#C94E0F);
}
</style>
</head>
<body>

<span class="label">Capa Facebook — 1702 × 630 px</span>

<div class="capa">

  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- Logo grande lateral esquerda (sobre a foto) -->
  <div class="logo-panel">
    <div class="logo-row">
      <img class="logo-icon" src="../imagens/logo - icone da logo.png" alt="">
      <div class="logo-nome"><span class="lm">LUMEN</span><span class="gr">GRID</span></div>
    </div>
    <span class="ei">Energia Inteligente</span>
  </div>

  <!-- Barra fosca inferior com serviços -->
  <div class="bar">
    <div class="bar-services">

      <div class="svc">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </div>
        <div class="svc-text">
          <span class="svc-title">Energia Solar</span>
          <span class="svc-desc">Até 95% de economia na sua conta</span>
        </div>
      </div>

      <div class="svc">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3M7 11v3M12 10v5"/></svg>
        </div>
        <div class="svc-text">
          <span class="svc-title">Híbrido com Baterias</span>
          <span class="svc-desc">Energia 24h, mesmo em apagões</span>
        </div>
      </div>

      <div class="svc">
        <div class="svc-icon">
          <svg viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h11l4 4v4"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/><path d="M21 13v4M23 13v4"/></svg>
        </div>
        <div class="svc-text">
          <span class="svc-title">Carregador p/ Carro Elétrico</span>
          <span class="svc-desc">Wallbox integrado à sua usina solar</span>
        </div>
      </div>

    </div>
  </div>

  <div class="foot-bar"></div>
</div>

</body>
</html>
